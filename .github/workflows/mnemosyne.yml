name: Mnemosyne Run

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task text (not needed for mode=report)"
        required: false
      goal_id:
        description: "Optional goal id to link this run to"
        required: false
      mode:
        description: "mnemosyne, baseline, or report"
        required: false
        default: "mnemosyne"
  repository_dispatch:
    types: [mnemosyne_run]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-key.json

      - name: Run Mnemosyne
        if: github.event.inputs.mode != 'baseline' && github.event.inputs.mode != 'report'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          python -m mnemosyne.main "${{ github.event.inputs.task || github.event.client_payload.task }}" \
            ${{ github.event.inputs.goal_id && format('--goal-id {0}', github.event.inputs.goal_id) || '' }}

      - name: Run baseline
        if: github.event.inputs.mode == 'baseline'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          python -m mnemosyne.baseline "${{ github.event.inputs.task }}"

      - name: Run report
        if: github.event.inputs.mode == 'report'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          python -m mnemosyne.report
